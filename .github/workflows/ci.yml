name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: platform
          POSTGRES_USER: platform_admin
          POSTGRES_PASSWORD: platform_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform_admin -d platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://platform_admin:platform_admin@127.0.0.1:5432/platform
      DATABASE_TEST_URL: postgresql://platform_admin:platform_admin@127.0.0.1:5432/platform
      TEST_POSTGRES_URL: postgresql://platform_admin:platform_admin@127.0.0.1:5432/platform
      GITHUB_REF_PROTECTED: ${{ github.ref_protected }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Render Postgres assets
        run: bun run db:render:postgres

      - name: Run verification suite
        run: bun run ci:check

      - name: Run coverage reporting
        run: bun run coverage:report

      - name: Package release bundle
        run: bun run package:release

      - name: Verify release bundle contents
        run: bun run verify:release-bundle

      - name: Generate SBOM
        run: bun run sbom:generate

      - name: Generate provenance manifest
        run: bun run provenance:generate

      - name: Run vulnerability audit
        run: bun run security:audit

      - name: Generate local signature manifest
        run: bun run sign:artifacts

      - name: Verify release signature manifest
        run: bun run verify:artifacts-signature

      - name: Attest release bundle provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ github.workspace }}/artifacts/release/gutu-framework-release.tgz

      - name: Attest release bundle SBOM
        uses: actions/attest-sbom@v3
        with:
          subject-path: ${{ github.workspace }}/artifacts/release/gutu-framework-release.tgz
          sbom-path: ${{ github.workspace }}/artifacts/sbom/gutu-framework-sbom.cdx.json

      - name: Upload Postgres artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: postgres-bootstrap-assets
          path: ops/postgres

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage

      - name: Upload release security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-security-artifacts
          path: artifacts

  workspace-init-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            frameworkMode: symlink
          - os: ubuntu-latest
            frameworkMode: copy
          - os: windows-latest
            frameworkMode: copy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run workspace init smoke
        run: bun run tooling/scripts/smoke-workspace-init.mjs --framework-mode ${{ matrix.frameworkMode }}
