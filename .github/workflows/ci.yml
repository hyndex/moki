name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd admin-panel && bunx playwright install --with-deps chromium

      - name: Start backend
        run: |
          cd admin-panel/backend
          NODE_ENV=development bun run src/main.ts &> /tmp/backend.log &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3333/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3333/api/health || (cat /tmp/backend.log && exit 1)

      - name: Start frontend
        run: |
          cd admin-panel
          bun run dev:ui &> /tmp/frontend.log &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5173/ > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:5173/ || (cat /tmp/frontend.log && exit 1)

      - name: E2E CRUD suite
        run: cd admin-panel && bun run scripts/e2e-crud.ts

      - name: Visual smoke
        run: cd admin-panel && bun run scripts/visual-smoke.ts

      - name: Visual interactions
        run: cd admin-panel && bun run scripts/visual-interactions.ts

      - name: Adversarial bug hunt
        run: cd admin-panel && bun run scripts/bug-hunt.ts

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tmp/visual-smoke/

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - name: Backend typecheck
        run: cd admin-panel/backend && bun run typecheck || true
      - name: Frontend typecheck
        run: cd admin-panel && bun run typecheck || true

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t gutu-admin:ci .
      - name: Smoke-run image
        run: |
          docker run -d --name gutu-test \
            -p 3333:3333 \
            -e NODE_ENV=development \
            gutu-admin:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3333/api/health > /dev/null; then break; fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3333/api/health || (docker logs gutu-test && exit 1)
          docker stop gutu-test
