<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="85" y1="16" x2="1110" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFF1E5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#68402A" font-family="Verdana, sans-serif" font-size="30" font-weight="700">Humans, agents, and Gutu work in a loop</text>
  <text x="600" y="88" text-anchor="middle" fill="#89614A" font-family="Verdana, sans-serif" font-size="18">The framework does not replace judgment. It gives everyone the same map.</text>

  <rect x="84" y="126" width="240" height="170" rx="24" fill="#FFFFFF"/>
  <rect x="480" y="112" width="240" height="198" rx="28" fill="#FFFDF8" stroke="#E4C2A6" stroke-width="3"/>
  <rect x="876" y="126" width="240" height="170" rx="24" fill="#FFFFFF"/>

  <text x="204" y="168" text-anchor="middle" fill="#6B432D" font-family="Verdana, sans-serif" font-size="24" font-weight="700">Human team</text>
  <text x="204" y="204" text-anchor="middle" fill="#8C624A" font-family="Verdana, sans-serif" font-size="16">Defines goals, product</text>
  <text x="204" y="226" text-anchor="middle" fill="#8C624A" font-family="Verdana, sans-serif" font-size="16">intent, approvals, and</text>
  <text x="204" y="248" text-anchor="middle" fill="#8C624A" font-family="Verdana, sans-serif" font-size="16">what “correct” means.</text>

  <text x="600" y="164" text-anchor="middle" fill="#6B432D" font-family="Verdana, sans-serif" font-size="26" font-weight="700">Gutu understanding layer</text>
  <text x="600" y="198" text-anchor="middle" fill="#8C624A" font-family="Verdana, sans-serif" font-size="16">Contracts, docs, invariants, permissions, tests,</text>
  <text x="600" y="220" text-anchor="middle" fill="#8C624A" font-family="Verdana, sans-serif" font-size="16">admin wrappers, and AI-safe execution boundaries.</text>
  <text x="600" y="260" text-anchor="middle" fill="#A16E52" font-family="Verdana, sans-serif" font-size="15">This is the shared mental model.</text>

  <text x="996" y="168" text-anchor="middle" fill="#6B432D" font-family="Verdana, sans-serif" font-size="24" font-weight="700">AI agent</text>
  <text x="996" y="204" text-anchor="middle" fill="#8C624A" font-family="Verdana, sans-serif" font-size="16">Reads the same docs and</text>
  <text x="996" y="226" text-anchor="middle" fill="#8C624A" font-family="Verdana, sans-serif" font-size="16">contracts, then generates</text>
  <text x="996" y="248" text-anchor="middle" fill="#8C624A" font-family="Verdana, sans-serif" font-size="16">code with less ambiguity.</text>

  <path d="M324 210H456" stroke="#D08C58" stroke-width="8" stroke-linecap="round"/>
  <path d="M744 210H876" stroke="#D08C58" stroke-width="8" stroke-linecap="round"/>
  <path d="M441 192L456 210L441 228" stroke="#D08C58" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M861 192L876 210L861 228" stroke="#D08C58" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(560 276)">
    <animateTransform attributeName="transform" type="translate" values="560 276;560 268;560 276" dur="3.8s" repeatCount="indefinite"/>
    <path d="M36 0C63 0 81 21 87 46L98 90C103 109 89 124 70 124H2C-17 124 -31 109 -26 90L-15 46C-9 21 9 0 36 0Z" fill="#FFFCF5" stroke="#6F3B21" stroke-width="6"/>
    <ellipse cx="18" cy="58" rx="8" ry="10" fill="#5B241B"/>
    <ellipse cx="54" cy="58" rx="8" ry="10" fill="#5B241B"/>
    <path d="M26 82C33 91 40 91 47 82" stroke="#D96E57" stroke-width="6" stroke-linecap="round"/>
    <rect x="10" y="76" width="52" height="34" rx="8" fill="#202028"/>
  </g>
</svg>
