<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EC"/>
      <stop offset="1" stop-color="#FFF2E2"/>
    </linearGradient>
    <filter id="soft" x="-40" y="-40" width="1280" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#D69B68" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text x="600" y="54" text-anchor="middle" fill="#65402B" font-family="Verdana, sans-serif" font-size="30" font-weight="700">How Gutu turns ideas into governed products</text>
  <text x="600" y="86" text-anchor="middle" fill="#8A6047" font-family="Verdana, sans-serif" font-size="18">Friendly on the outside, strict where it matters.</text>

  <g filter="url(#soft)">
    <rect x="56" y="126" width="230" height="168" rx="24" fill="#FFFFFF"/>
    <rect x="338" y="126" width="230" height="168" rx="24" fill="#FFFFFF"/>
    <rect x="620" y="126" width="230" height="168" rx="24" fill="#FFFFFF"/>
    <rect x="902" y="126" width="242" height="168" rx="24" fill="#FFFFFF"/>
  </g>

  <path d="M286 210H338" stroke="#D08C58" stroke-width="8" stroke-linecap="round"/>
  <path d="M568 210H620" stroke="#D08C58" stroke-width="8" stroke-linecap="round"/>
  <path d="M850 210H902" stroke="#D08C58" stroke-width="8" stroke-linecap="round"/>
  <path d="M323 192L338 210L323 228" stroke="#D08C58" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M605 192L620 210L605 228" stroke="#D08C58" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M887 192L902 210L887 228" stroke="#D08C58" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <circle cx="112" cy="168" r="22" fill="#FFE6CA"/>
    <rect x="147" y="148" width="106" height="34" rx="17" fill="#FFF2DF"/>
    <text x="147" y="214" fill="#6D412C" font-family="Verdana, sans-serif" font-size="24" font-weight="700">1. Describe</text>
    <text x="147" y="241" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">Model the domain with</text>
    <text x="147" y="263" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">resources, actions, docs,</text>
    <text x="147" y="285" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">and business invariants.</text>
  </g>

  <g>
    <circle cx="394" cy="168" r="22" fill="#FFE6CA"/>
    <rect x="429" y="148" width="106" height="34" rx="17" fill="#FFF2DF"/>
    <text x="429" y="214" fill="#6D412C" font-family="Verdana, sans-serif" font-size="24" font-weight="700">2. Compose</text>
    <text x="429" y="241" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">Ship features as plugins,</text>
    <text x="429" y="263" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">admin surfaces, reports,</text>
    <text x="429" y="285" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">and optional AI packs.</text>
  </g>

  <g>
    <circle cx="676" cy="168" r="22" fill="#FFE6CA"/>
    <rect x="711" y="148" width="106" height="34" rx="17" fill="#FFF2DF"/>
    <text x="711" y="214" fill="#6D412C" font-family="Verdana, sans-serif" font-size="24" font-weight="700">3. Govern</text>
    <text x="711" y="241" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">Permissions, trust tiers,</text>
    <text x="711" y="263" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">audit, release checks,</text>
    <text x="711" y="285" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">and AI-safe boundaries.</text>
  </g>

  <g>
    <circle cx="958" cy="168" r="22" fill="#FFE6CA"/>
    <rect x="993" y="148" width="118" height="34" rx="17" fill="#FFF2DF"/>
    <text x="993" y="214" fill="#6D412C" font-family="Verdana, sans-serif" font-size="24" font-weight="700">4. Ship</text>
    <text x="993" y="241" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">Build, test, sign, produce</text>
    <text x="993" y="263" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">SBOM + provenance, then</text>
    <text x="993" y="285" fill="#8A6047" font-family="Verdana, sans-serif" font-size="16">publish with confidence.</text>
  </g>
</svg>
